<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#046a4e" />
    <meta name="description" content="Emerald City Comic Con 2026 panel schedule viewer" />
    <title>ECCC 2026 Schedule</title>

    <!-- Canonical -->
    <link rel="canonical" href="https://eccc26.karilaa.dev/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ECCC 2026 Schedule" />
    <meta property="og:title" content="ECCC 2026 Schedule" />
    <meta property="og:description" content="Emerald City Comic Con 2026 panel schedule viewer" />
    <meta property="og:url" content="https://eccc26.karilaa.dev/" />
    <meta property="og:image" content="https://eccc26.karilaa.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ECCC 2026 Schedule" />
    <meta name="twitter:description" content="Emerald City Comic Con 2026 panel schedule viewer" />
    <meta name="twitter:image" content="https://eccc26.karilaa.dev/og-image.png" />

    <!-- Favicon & Icons -->
    <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon-192.svg" />

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ECCC '26" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Figtree:ital,wght@0,400;0,500;0,600;1,400&display=optional" rel="stylesheet" />
    <link rel="stylesheet" href="../src/styles.css" />
    <style>
      /* Dark mode overrides — inline to bypass Tailwind bundler tree-shaking */
      .dark {
        --color-surface: #111113;
        --color-surface-warm: #1a1a1d;
        --color-surface-card: #222226;
        --color-ink: #ededeb;
        --color-ink-muted: #a8a8a8;
        --color-ink-faint: #727272;
        --color-accent: #3dd9a0;
        --color-accent-light: #0b4d38;
        --color-accent-subtle: #0c2a20;
        --color-border: #333338;
        --color-border-light: #2a2a2e;
        --color-favorite: #f5a623;
        --color-favorite-subtle: #2d2518;
        --color-divider: #2a2a2e;
      }
      .dark body::before { opacity: 0.04; mix-blend-mode: overlay; }
      .dark .skeleton {
        background: linear-gradient(90deg, #2a2a2e 25%, #333338 50%, #2a2a2e 75%);
        background-size: 200% 100%;
      }
    </style>
    <script>
      // Apply dark mode before first paint to prevent flash
      (function() {
        var t = localStorage.getItem('eccc-theme');
        var dark = t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Static shell for instant LCP — replaced by React on hydration -->
      <div style="min-height:100vh;background:var(--color-surface,#f7f5f2)">
        <header style="position:sticky;top:0;z-index:30;border-bottom:1px solid var(--color-border-light,#ece8e2);background:var(--color-surface-card,#fff)">
          <div style="max-width:64rem;margin:0 auto;padding:0.75rem 1rem 0.5rem">
            <div style="display:flex;align-items:baseline;gap:0.375rem">
              <span style="font-family:'Outfit',sans-serif;font-size:1.25rem;font-weight:800;letter-spacing:-0.025em;color:var(--color-ink,#111)">ECCC</span>
              <span style="font-family:'Outfit',sans-serif;font-size:1.25rem;font-weight:800;letter-spacing:-0.025em;color:var(--color-accent,#046a4e)">&rsquo;26</span>
              <span style="font-family:'Outfit',sans-serif;font-size:1.25rem;font-weight:800;letter-spacing:-0.025em;color:var(--color-ink,#111)">Schedule</span>
            </div>
          </div>
        </header>
      </div>
    </div>
    <script type="module" src="../src/index.tsx"></script>
  </body>
</html>
